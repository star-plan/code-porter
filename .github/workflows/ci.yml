name: ci

on:
  pull_request:
    paths:
      - "**"
      - ".github/workflows/ci.yml"
      - ".github/workflows/publish.yml"
  push:
    branches:
      - main
    paths:
      - "**"
      - ".github/workflows/ci.yml"
      - ".github/workflows/publish.yml"

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Sync dependencies
        run: uv sync

      - name: Run tests
        run: uv run pytest

      - name: Build package
        run: uv build

      - name: uvx smoke test
        run: uvx --from . code-porter --help